<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Acvus Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1a1a;
      --surface: #222;
      --border:  #333;
      --text:    #d4d4d4;
      --muted:   #555;
      --accent:  #4ec9b0;
      --error:   #f48771;
      --ok:      #89d185;
      --mono:    'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;

      --syn-kw:    #c586c0;
      --syn-val:   #9cdcfe;
      --syn-lbl:   #dcdcaa;
      --syn-str:   #ce9178;
      --syn-num:   #b5cea8;
      --syn-bool:  #569cd6;
      --syn-sto:   #89d185;
      --syn-cmt:   #6a9955;
      --syn-ln:    #444;
      --syn-delim: #569cd6;
      --syn-pipe:  #dcdcaa;
      --syn-fn:    #dcdcaa;
      --syn-op:    #d4d4d4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 9px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    #status {
      font-size: 11px;
      color: var(--muted);
      transition: color .15s;
    }
    #status.ok    { color: var(--ok); }
    #status.error { color: var(--error); }

    /* ── Main split ── */
    .split {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left column ── */
    .left-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .section.template { flex: 2; border-bottom: 1px solid var(--border); }
    .section.context  { flex: 1; }

    /* ── Right pane ── */
    .right-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-label {
      padding: 5px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-bar button {
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .tab-bar button:hover { color: var(--text); }
    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Shared editor metrics ── */
    .editor-font {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
      tab-size: 2;
      -moz-tab-size: 2;
    }

    /* ── Editor overlay (template highlighting) ── */
    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .editor-wrap .hl-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 14px 16px;
      overflow: auto;
      pointer-events: none;
      z-index: 0;
      border: none;
      margin: 0;
      color: var(--text);
      scrollbar-width: none;          /* Firefox */
    }
    .editor-wrap .hl-layer::-webkit-scrollbar { display: none; }

    .editor-wrap textarea {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      border: none;
      outline: none;
      resize: none;
      padding: 14px 16px;
      overflow: auto;
      scrollbar-width: none;          /* Firefox */
    }
    .editor-wrap textarea::-webkit-scrollbar { display: none; }

    .editor-wrap textarea::placeholder {
      color: var(--muted);
    }

    .editor-wrap textarea::selection {
      background: rgba(78, 201, 176, 0.25);
      color: transparent;
    }

    /* ── MIR output ── */
    pre {
      flex: 1;
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      padding: 14px 16px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      tab-size: 2;
      -moz-tab-size: 2;
    }

    pre.is-error { color: var(--error); }

    .hint {
      padding: 5px 12px 7px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .hint code {
      color: var(--accent);
      font-family: var(--mono);
    }

    /* ── MIR syntax colors ── */
    .m-h    { color: var(--accent); font-weight: 600; }
    .m-kw   { color: var(--syn-kw); }
    .m-val  { color: var(--syn-val); }
    .m-lbl  { color: var(--syn-lbl); }
    .m-tidx { color: var(--syn-str); }
    .m-str  { color: var(--syn-str); }
    .m-num  { color: var(--syn-num); }
    .m-bool { color: var(--syn-bool); }
    .m-sto  { color: var(--syn-sto); }
    .m-cmt  { color: var(--syn-cmt); font-style: italic; }
    .m-ln   { color: var(--syn-ln); }

    /* ── Template syntax colors ── */
    .t-delim { color: var(--syn-delim); font-weight: 600; }
    .t-kw    { color: var(--syn-kw); }
    .t-sto   { color: var(--syn-sto); }
    .t-pipe  { color: var(--syn-pipe); font-weight: 600; }
    .t-str   { color: var(--syn-str); }
    .t-num   { color: var(--syn-num); }
    .t-bool  { color: var(--syn-bool); }
    .t-fn    { color: var(--syn-fn); }
    .t-op    { color: var(--syn-op); }
    .t-raw   { color: #888; }

    /* ── Markdown syntax colors ── */
    .md-h    { color: var(--accent); font-weight: 600; }
    .md-b    { font-weight: 600; color: var(--text); }
    .md-i    { font-style: italic; color: var(--text); }
    .md-c    { color: #e06c75; }
    .md-link { color: var(--syn-bool); }
    .md-li   { color: var(--accent); }
    .md-bq   { color: var(--muted); font-style: italic; }
    .md-hr   { color: var(--muted); }

    /* ── JSON syntax colors ── */
    .j-key  { color: var(--syn-val); }
    .j-str  { color: var(--syn-str); }
    .j-num  { color: var(--syn-num); }
    .j-bool { color: var(--syn-bool); }
    .j-null { color: var(--syn-kw); }
    .j-brace { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>Acvus Playground</h1>
  <span id="status">ready</span>
</header>

<div class="split">
  <div class="left-col">
    <div class="section template">
      <div class="pane-label">Template</div>
      <div class="editor-wrap">
        <div class="hl-layer editor-font" id="source-hl" aria-hidden="true"></div>
        <textarea id="source" class="editor-font" spellcheck="false"
          placeholder="{{ x in 0..3 }}{{ x | to_string }}{{/}}">Hello, {{ @name }}!

{-{ adults = @users | filter(u -> u.age >= 20) }}
**Adults:**
{-{ { name, age, } in adults }}
  - {{ name }} ({{ age | to_string }})
{-{/-2}}

{-{ teens = @users | filter(u -> u.age >= 13 && u.age < 20) }}
**Teens:**
{-{ { name, age, } in teens }}
  - {{ name }} ({{ age | to_string }})
{-{/-2}}

Total age: {{ @users | fold(0, (acc, u) -> acc + u.age) | to_string }}

{{ "admin" = @role }}You are **admin**.{{_}}You are guest.{{/}}</textarea>
      </div>
    </div>
    <div class="section context">
      <div class="pane-label">Context</div>
      <div class="editor-wrap">
        <div class="hl-layer editor-font" id="storage-hl" aria-hidden="true"></div>
        <textarea id="storage" class="editor-font" spellcheck="false"
          placeholder='{"name": "alice", "items": [1, 2, 3]}'>{
  "name": "alice",
  "users": [
    {"name": "alice", "age": 30},
    {"name": "bob", "age": 17},
    {"name": "charlie", "age": 25},
    {"name": "diana", "age": 15},
    {"name": "eve", "age": 42}
  ],
  "role": "admin"
}</textarea>
      </div>
      <div class="hint">
        JSON values — types are inferred.
        &nbsp;·&nbsp; <code>{"name": "alice"}</code>
        &nbsp;·&nbsp; <code>{"items": [1, 2]}</code>
        &nbsp;·&nbsp; <code>{"user": {"age": 30}}</code>
      </div>
    </div>
  </div>
  <div class="right-pane">
    <div class="tab-bar">
      <button class="active" data-tab="output">Output</button>
      <button data-tab="mir">MIR</button>
    </div>
    <pre id="output-pane"></pre>
    <pre id="mir-pane" style="display:none"></pre>
  </div>
</div>

<script>
  const sourceEl    = document.getElementById('source');
  const outputPane  = document.getElementById('output-pane');
  const mirPane     = document.getElementById('mir-pane');
  const statusEl    = document.getElementById('status');
  const storageEl   = document.getElementById('storage');
  const sourceHl    = document.getElementById('source-hl');
  const storageHl   = document.getElementById('storage-hl');

  // ── Tab switching ──

  const tabButtons = document.querySelectorAll('.tab-bar button');
  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      outputPane.style.display = tab === 'output' ? '' : 'none';
      mirPane.style.display    = tab === 'mir'    ? '' : 'none';
    });
  });

  // ── HTML escape ──

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Template syntax highlighting ──

  const tmplInnerRules = [
    [/^\//, 't-delim'],
    [/^"(?:[^"\\]|\\.)*"/, 't-str'],
    [/^@\w+/, 't-sto'],
    [/^\$\w+/, 't-sto'],
    [/^(?:in|match)\b/, 't-kw'],
    [/^(?:true|false)\b/, 't-bool'],
    [/^_\b/, 't-kw'],
    [/^=>/, 't-kw'],
    [/^\|/, 't-pipe'],
    [/^\.\.=?/, 't-op'],
    [/^=\.\./, 't-op'],
    [/^[=!<>]=/, 't-op'],
    [/^[+\-*\/<>!]/, 't-op'],
    [/^\d+(?:\.\d+)?/, 't-num'],
    [/^[a-zA-Z_]\w*/, 't-fn'],
    [/^\s+/, null],
    [/^./, null],
  ];

  function highlightTmplInner(text) {
    let result = '';
    let rest = text;
    while (rest.length > 0) {
      let matched = false;
      for (const [re, cls] of tmplInnerRules) {
        const m = rest.match(re);
        if (m) {
          const tok = esc(m[0]);
          result += cls ? `<span class="${cls}">${tok}</span>` : tok;
          rest = rest.slice(m[0].length);
          matched = true;
          break;
        }
      }
      if (!matched) {
        result += esc(rest[0]);
        rest = rest.slice(1);
      }
    }
    return result;
  }

  function highlightTemplate(text) {
    let result = '';
    let i = 0;
    while (i < text.length) {
      // Detect opening: {-{ or {{
      let openDelim = null;
      if (text[i] === '{' && text[i+1] === '-' && text[i+2] === '{') {
        openDelim = '{-{';
      } else if (text[i] === '{' && text[i+1] === '{') {
        openDelim = '{{';
      }
      if (openDelim) {
        result += '<span class="t-delim">' + esc(openDelim) + '</span>';
        i += openDelim.length;
        let inner = '';
        while (i < text.length) {
          // Detect closing: }-} or }}
          if (text[i] === '}' && text[i+1] === '-' && text[i+2] === '}') {
            result += highlightTmplInner(inner);
            result += '<span class="t-delim">}-}</span>';
            i += 3;
            break;
          } else if (text[i] === '}' && text[i+1] === '}') {
            result += highlightTmplInner(inner);
            result += '<span class="t-delim">}}</span>';
            i += 2;
            break;
          }
          inner += text[i];
          i++;
        }
      } else {
        // Raw text outside {{ }}
        let raw = '';
        while (i < text.length) {
          if (text[i] === '{' && (text[i+1] === '{' || (text[i+1] === '-' && text[i+2] === '{'))) break;
          raw += text[i];
          i++;
        }
        result += highlightMarkdown(raw);
      }
    }
    // Trailing newline so highlight layer matches textarea height
    return result + '\n';
  }

  // ── Markdown highlighting (raw text outside {{ }}) ──

  const mdLineStartRules = [
    [/^#{1,6} [^\n]*/, 'md-h'],
    [/^[-*+] /, 'md-li'],
    [/^\d+\. /, 'md-li'],
    [/^> /, 'md-bq'],
    [/^---+(?=\n|$)/, 'md-hr'],
  ];

  const mdInlineRules = [
    [/^`[^`\n]+`/, 'md-c'],
    [/^\*\*[^*\n]+?\*\*/, 'md-b'],
    [/^\*(?!\*)[^*\n]+?\*(?!\*)/, 'md-i'],
    [/^\[[^\]\n]+\]\([^)\n]+\)/, 'md-link'],
    [/^[^*`\[\n#\->0-9]+/, 't-raw'],
    [/^\n/, null],
    [/^./, 't-raw'],
  ];

  function highlightMarkdown(text) {
    let result = '';
    let rest = text;
    let lineStart = true;
    while (rest.length > 0) {
      let matched = false;
      const rules = lineStart ? [...mdLineStartRules, ...mdInlineRules] : mdInlineRules;
      for (const [re, cls] of rules) {
        const m = rest.match(re);
        if (m) {
          const tok = esc(m[0]);
          result += cls ? `<span class="${cls}">${tok}</span>` : tok;
          lineStart = m[0][m[0].length - 1] === '\n';
          rest = rest.slice(m[0].length);
          matched = true;
          break;
        }
      }
      if (!matched) {
        result += '<span class="t-raw">' + esc(rest[0]) + '</span>';
        lineStart = rest[0] === '\n';
        rest = rest.slice(1);
      }
    }
    return result;
  }

  // ── JSON highlighting (context pane) ──

  const jsonRules = [
    [/^"(?:[^"\\]|\\.)*"\s*(?=:)/, 'j-key'],
    [/^"(?:[^"\\]|\\.)*"/, 'j-str'],
    [/^-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?/, 'j-num'],
    [/^(?:true|false)\b/, 'j-bool'],
    [/^null\b/, 'j-null'],
    [/^[{}[\]:,]/, 'j-brace'],
    [/^\s+/, null],
    [/^./, null],
  ];

  function highlightJson(text) {
    let result = '';
    let rest = text;
    while (rest.length > 0) {
      let matched = false;
      for (const [re, cls] of jsonRules) {
        const m = rest.match(re);
        if (m) {
          const tok = esc(m[0]);
          result += cls ? `<span class="${cls}">${tok}</span>` : tok;
          rest = rest.slice(m[0].length);
          matched = true;
          break;
        }
      }
      if (!matched) {
        result += esc(rest[0]);
        rest = rest.slice(1);
      }
    }
    return result + '\n';
  }

  // ── Sync highlights ──

  function syncSourceHighlight() {
    sourceHl.innerHTML = highlightTemplate(sourceEl.value);
  }

  function syncStorageHighlight() {
    storageHl.innerHTML = highlightJson(storageEl.value);
  }

  sourceEl.addEventListener('scroll', () => {
    sourceHl.scrollTop = sourceEl.scrollTop;
    sourceHl.scrollLeft = sourceEl.scrollLeft;
  });

  storageEl.addEventListener('scroll', () => {
    storageHl.scrollTop = storageEl.scrollTop;
    storageHl.scrollLeft = storageEl.scrollLeft;
  });

  // ── MIR syntax highlighting ──

  const mirTokenRules = [
    [/^"(?:[^"\\]|\\.)*"/, 'm-str'],
    [/^@\w+/, 'm-sto'],
    [/^\$\w+/, 'm-sto'],
    [/^(?:context_load|var_load|var_store|async_call|call_closure|emit_text|iter_init|iter_next|jump_if|call|await|emit|const|list|object|tuple|closure|jump|return|test|range|nop|then|else|has_key|len|in)\b/, 'm-kw'],
    [/^(?:true|false)\b/, 'm-bool'],
    [/^r\d+\b/, 'm-val'],
    [/^L\d+\b/, 'm-lbl'],
    [/^T\d+\b/, 'm-tidx'],
    [/^-?\d+(?:\.\d+)?/, 'm-num'],
    [/^(?:[=!<>]=|\.\.=?|=\.\.)/, null],
    [/^[a-zA-Z_]\w*/, null],
    [/^\s+/, null],
    [/^./, null],
  ];

  function mirTokenize(text) {
    let result = '';
    let rest = text;
    while (rest.length > 0) {
      let matched = false;
      for (const [re, cls] of mirTokenRules) {
        const m = rest.match(re);
        if (m) {
          const tok = esc(m[0]);
          result += cls ? `<span class="${cls}">${tok}</span>` : tok;
          rest = rest.slice(m[0].length);
          matched = true;
          break;
        }
      }
      if (!matched) {
        result += esc(rest[0]);
        rest = rest.slice(1);
      }
    }
    return result;
  }

  function highlightMir(raw) {
    return raw.split('\n').map(mirLine).join('\n');
  }

  function mirLine(line) {
    // Section headers: === ... ===
    if (line.startsWith('===')) {
      return '<span class="m-h">' + esc(line) + '</span>';
    }

    // Comment / type annotation lines: starts with whitespace + ;
    const cmatch = line.match(/^(\s+)(;.+)$/);
    if (cmatch) {
      return cmatch[1] + '<span class="m-cmt">' + esc(cmatch[2]) + '</span>';
    }

    // Text table entries: "  T0 = "value""
    const tmatch = line.match(/^(\s+)(T\d+)(\s*=\s*)(".*")$/);
    if (tmatch) {
      return tmatch[1]
        + '<span class="m-tidx">' + esc(tmatch[2]) + '</span>'
        + esc(tmatch[3])
        + '<span class="m-str">' + esc(tmatch[4]) + '</span>';
    }

    // Instruction lines: line-number │ instruction
    const imatch = line.match(/^(\s*\d+\s*│\s*)(.*)$/);
    if (imatch) {
      return '<span class="m-ln">' + esc(imatch[1]) + '</span>' + mirTokenize(imatch[2]);
    }

    return esc(line);
  }

  // ── Compilation ──

  let timer = null;
  function schedule() {
    clearTimeout(timer);
    timer = setTimeout(doCompile, 350);
  }

  async function doCompile() {
    const source = sourceEl.value;
    if (!source.trim()) {
      outputPane.innerHTML = '';
      outputPane.className = '';
      mirPane.innerHTML = '';
      mirPane.className = '';
      setStatus('ready', '');
      return;
    }

    let context = {};
    const raw = storageEl.value.trim();
    if (raw) {
      try {
        const normalized = raw.replace(/,\s*([}\]])/g, '$1');
        context = JSON.parse(normalized);
      } catch {
        setStatus('invalid context JSON', 'error');
        return;
      }
    }

    setStatus('compiling…', '');
    try {
      const res  = await fetch('/api/compile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source, context }),
      });
      const data = await res.json();
      if (data.error) {
        outputPane.textContent = data.error;
        outputPane.className = 'is-error';
        mirPane.textContent = data.error;
        mirPane.className = 'is-error';
        setStatus('error', 'error');
      } else {
        outputPane.textContent = data.output ?? '';
        outputPane.className = '';
        mirPane.innerHTML = highlightMir(data.ir ?? '');
        mirPane.className = '';
        setStatus('ok', 'ok');
      }
    } catch (e) {
      const msg = 'server unreachable: ' + e.message;
      outputPane.textContent = msg;
      outputPane.className = 'is-error';
      mirPane.textContent = msg;
      mirPane.className = 'is-error';
      setStatus('error', 'error');
    }
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls;
  }

  sourceEl.addEventListener('input', () => { syncSourceHighlight(); schedule(); });
  storageEl.addEventListener('input', () => { syncStorageHighlight(); schedule(); });

  // ── Init: highlight + compile the default sample ──
  syncSourceHighlight();
  syncStorageHighlight();
  doCompile();
</script>
</body>
</html>
