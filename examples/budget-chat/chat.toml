name = "chat"
kind = "llm"
provider = "gemini"
model = "gemini-2.5-flash"
# Total token pool shared across all budgeted iterators.
max_tokens = 16000

[[messages]]
role = "system"
template = "system.acvus"

# Chat history with token budget.
# priority = 0 (fills first), max = 12000 caps this iterator.
[[messages]]
iterator = "@history"
token_budget = { priority = 0, max = 12000 }

[[messages]]
role = "user"
template = "user.acvus"
