name = "chat"
kind = "llm"
provider = "gemini"
model = "gemini-2.5-flash"
# Token limits.
[max_tokens]
input = 16000

[self]

[strategy]
mode = "history"
inline_history_bind = "@self"

[[messages]]
role = "system"
template = "system.acvus"

# Chat history with token budget.
# priority = 0 (fills first), max = 12000 caps this iterator.
[[messages]]
iterator = "@turn.history | map(h -> h.chat)"
token_budget = { priority = 0, max = 12000 }

[[messages]]
role = "user"
template = "user.acvus"
