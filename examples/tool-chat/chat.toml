name = "chat"
kind = "llm"
provider = "gemini"
model = "gemini-2.5-flash"

[self]

[strategy]
mode = "history"
inline_history_bind = "@self"

[[messages]]
role = "system"
template = "system.acvus"

[[messages]]
iterator = "@turn.history | map(h -> h.chat)"

[[messages]]
role = "user"
template = "user.acvus"

[[tools]]
name = "get_weather"
description = "Get current weather for a city"
node = "get_weather"
params = { city = "string" }
