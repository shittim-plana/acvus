name = "chat"
kind = "llm"
provider = "gemini"
model = "gemini-2.5-flash"

[self]

[strategy]
mode = "history"
inline_history_bind = "@self"

[[messages]]
role = "system"
inline_template = "You are a helpful assistant. Answer concisely."

[[messages]]
iterator = "@turn.history | map(h -> h.chat)"

[[messages]]
role = "user"
inline_template = "{{ @input }}"
